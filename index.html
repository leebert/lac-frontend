<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life Admin Copilot</title>
</head>

<body>
  <h1>Life Admin Copilot</h1>

  <div id="error-container" class="modal-overlay" style="display: none;">
    <div class="modal-content">
      <h2>Error</h2>
      <div id="error-message"></div>
      <button id="error-dismiss-button" class="modal-button">OK</button>
    </div>
  </div>
  <main>

    <div class="grid-column">
      <h2>Conversation</h2>
    <div id="chat-history"></div>

    <div id="input-container">
      <textarea id="message-input" class="input" placeholder="Ask for guidance on handling logistical tasks like registering to vote" rows="1"></textarea>
      <button id="send-button"><img src="/src/assets/send.svg" alt="Back"></button>
    </div>

    <div class="token-usage">
      <div id="token-summarization">100% left before summarization</div>
      <div id="token-limit">100% left before limit</div>
    </div>
    </div>


    <div class="grid-column">
      <h2>Checklist</h2>
      <div id="todo-list">Ask for advice to see next steps.</div>
    </div>
  </main>

  <div id="password-modal" class="password-modal hidden">
    <div class="password-modal-content">
      <h2>Protected Demo</h2>
      <div class="password-input-container">
        <input type="password" id="password-input" class="input" placeholder="Password" autocomplete="off" />
        <button id="password-submit">Submit</button>
      </div>
      <div id="password-error" class="password-error hidden"></div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
